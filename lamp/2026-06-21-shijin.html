<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>夜行图鉴 · 拾烬</title>
<style>
  html,body{margin:0;height:100%;background:#0a0b0f;overflow:hidden;
    font:15px/1.6 -apple-system,"PingFang SC",system-ui,sans-serif;color:#cdc8be;cursor:none}
  #c{display:block;position:fixed;inset:0}
  .card{position:fixed;left:24px;bottom:22px;max-width:300px;z-index:2;
    background:rgba(14,15,21,.55);backdrop-filter:blur(6px);
    border:1px solid #20232e;border-radius:14px;padding:14px 16px}
  .name{font-size:20px;letter-spacing:3px;color:#f0c45a}
  .latin{font-size:11px;letter-spacing:2px;color:#6f7480;margin:2px 0 8px;text-transform:uppercase}
  .myth{font-size:13px;color:#a7a399;margin:0}
  .hint{position:fixed;top:18px;right:22px;font-size:12px;color:#555a66;z-index:2;letter-spacing:1px}
  .no{color:#f0c45a}
</style></head><body>
<canvas id="c"></canvas>
<div class="card">
  <div class="name">拾烬</div>
  <div class="latin">No.001 · the ember-gatherer</div>
  <p class="myth">它没有身体，只有一捧不肯熄的火星。哪里有光移动，它就跟去，把别人丢下的余温一粒粒拾起来攒成自己的形状。你停下，它就暗下去；你一动，它又亮起来——所以它怕的从来不是黑，是<span class="no">没人提着灯走</span>。</p>
</div>
<div class="hint">移动 = 提灯　·　点击 = 惊散它</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR;function fit(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
fit();addEventListener('resize',fit);
const N=170, P=[];
const rnd=(a,b)=>a+Math.random()*(b-a);
for(let i=0;i<N;i++)P.push({x:rnd(0,W),y:rnd(0,H),vx:0,vy:0,r:rnd(.6,2.4)*DPR,h:rnd(.45,1),t:rnd(0,99)});
// 灯（指针）位置；没动时回到屏幕中心微微呼吸
let lx=W/2,ly=H/2,tx=W/2,ty=H/2,moving=0,last=performance.now();
function aim(cx,cy){tx=cx*DPR;ty=cy*DPR;moving=1;last=performance.now();}
addEventListener('pointermove',e=>aim(e.clientX,e.clientY));
addEventListener('pointerdown',e=>{aim(e.clientX,e.clientY);
  for(const p of P){const a=rnd(0,6.283),f=rnd(6,16)*DPR;p.vx+=Math.cos(a)*f;p.vy+=Math.sin(a)*f;}});
function loop(now){
  // 灯本体缓动；空闲超 1.4s 视为没人提灯 → 火星黯淡涣散
  if(now-last>1400){moving=0;tx=W/2+Math.cos(now/1700)*W*.13;ty=H/2+Math.sin(now/2100)*H*.1;}
  lx+=(tx-lx)*.08;ly+=(ty-ly)*.08;
  x.globalCompositeOperation='source-over';x.fillStyle='rgba(10,11,15,.22)';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const p of P){
    const dx=lx-p.x,dy=ly-p.y,d=Math.hypot(dx,dy)+1e-3;
    const pull=(moving?0.55:0.16);                 // 提着灯走时聚拢更急
    p.vx+=dx/d*pull; p.vy+=dy/d*pull;
    p.vx+=Math.cos(p.t+now/900)*0.12;              // 火星自己的乱颤
    p.vy+=Math.sin(p.t*1.3+now/700)*0.12;
    p.vx*=0.90; p.vy*=0.90; p.x+=p.vx; p.y+=p.vy; p.t+=0.01;
    const near=Math.max(0,1-d/(260*DPR));
    const glow=p.h*(moving?(.35+near*.65):0.22);    // 没人提灯就暗
    const R=p.r*(1+near*2.2);
    const g=x.createRadialGradient(p.x,p.y,0,p.x,p.y,R*4);
    g.addColorStop(0,`rgba(255,${200-near*40|0},${110+near*40|0},${glow})`);
    g.addColorStop(1,'rgba(255,140,40,0)');
    x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,R*4,0,6.283);x.fill();
  }
  // 灯芯
  x.fillStyle='rgba(255,236,190,'+(moving?.9:.4)+')';
  x.beginPath();x.arc(lx,ly,2.5*DPR,0,6.283);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
