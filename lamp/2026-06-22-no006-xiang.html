<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No.006 · 响</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #04060a;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Georgia', 'Songti SC', serif;
  user-select: none;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.label {
  position: fixed;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}

.name {
  font-size: 1.3rem;
  letter-spacing: 0.4em;
  color: #3dedb6;
  opacity: 0.18;
  display: block;
  margin-bottom: 10px;
  transition: opacity 0.8s ease;
}

.hint {
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  color: #3a4840;
  display: block;
}

.label.active .name {
  opacity: 0.65;
}

.num {
  position: fixed;
  top: 38px;
  left: 44px;
  font-size: 0.6rem;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.12em;
  color: #18201e;
  pointer-events: none;
}

.back {
  position: fixed;
  top: 35px;
  right: 44px;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: #182018;
  text-decoration: none;
  transition: color 0.35s;
}
.back:hover { color: #3dedb6; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="label" id="label">
  <span class="name">响</span>
  <span class="hint">敲，等，再敲——它学的是你的拍子</span>
</div>

<div class="num">No.006</div>
<a class="back" href="2026-06-22-tujian.html">图鉴</a>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const label = document.getElementById('label');

// ── geometry ──────────────────────────────────────────────────────────────
const COLOR = [61, 237, 182]; // #3dedb6

// Ring definitions: radius, particle count, phase offset per particle
const RING_DEFS = [
  { r: 28,  n: 8,  spread: 5  },
  { r: 54,  n: 12, spread: 8  },
  { r: 83,  n: 16, spread: 10 },
  { r: 112, n: 20, spread: 12 },
  { r: 142, n: 24, spread: 14 },
];

// Each particle: base ring radius, angle, current radius (animated), opacity
const particles = [];
RING_DEFS.forEach((def, ri) => {
  for (let i = 0; i < def.n; i++) {
    const baseAngle = (i / def.n) * Math.PI * 2;
    // slight angle jitter so rings look organic not mechanical
    const angleJitter = (Math.random() - 0.5) * 0.18;
    particles.push({
      ri,
      baseR: def.r,
      angle: baseAngle + angleJitter,
      curR: def.r * (0.05 + Math.random() * 0.08),  // start near center
      targetR: def.r * (0.05 + Math.random() * 0.08),
      dissolveR: 180 + Math.random() * 100,           // where they drift when silent
      spread: def.spread,
      opacity: 0,
      baseOpacity: 0.45 + Math.random() * 0.35,
    });
  }
});

// ── state ─────────────────────────────────────────────────────────────────
let W, H, CX, CY, DPR;

function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  cv.width  = innerWidth  * DPR;
  cv.height = innerHeight * DPR;
  cv.style.width  = innerWidth  + 'px';
  cv.style.height = innerHeight + 'px';
  ctx.scale(DPR, DPR);
  W = innerWidth;
  H = innerHeight;
  CX = W / 2;
  CY = H / 2;
}
resize();
addEventListener('resize', resize);

// Rhythm engine
const MAX_INTERVALS = 6;
const intervals = [];
let lastKeyTime = 0;
let awake = false;         // has user typed at all
let silenceTimer = 0;      // ms since last key
let heartbeatPhase = 0;    // 0–1 within current heartbeat cycle
let heartbeatPeriod = 900; // ms, derived from typing rhythm
let lastFrameTime = performance.now();

// Pulse wave: each keypress triggers an outward pulse that travels ring-by-ring
const pulses = []; // {phase: 0–1, strength: 0–1}

// dissolveProgress: 0 = fully formed, 1 = fully dissolved
let dissolveProgress = 1;
let activeLevel = 0;        // 0–1 smoothed "aliveness"

function recordKey() {
  const now = performance.now();
  if (lastKeyTime > 0) {
    const gap = now - lastKeyTime;
    if (gap < 4000) {          // only count gaps under 4 s as rhythm
      intervals.push(gap);
      if (intervals.length > MAX_INTERVALS) intervals.shift();
      heartbeatPeriod = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      heartbeatPeriod = Math.max(180, Math.min(2400, heartbeatPeriod));
    }
  }
  lastKeyTime = now;
  silenceTimer = 0;
  awake = true;
  // inject a pulse
  pulses.push({ phase: 0, strength: 0.85 + Math.random() * 0.15 });
  if (pulses.length > 8) pulses.shift();
  label.classList.add('active');
}

document.addEventListener('keydown', recordKey);

// ── draw loop ─────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function draw(now) {
  requestAnimationFrame(draw);
  const dt = now - lastFrameTime;
  lastFrameTime = now;

  // ── silence accounting ─────────────────────────────────────────────────
  if (awake) {
    silenceTimer += dt;
    if (silenceTimer > 5500) {
      label.classList.remove('active');
    }
  }

  // dissolve: starts after 3 s of silence, complete at 7 s
  const silenceFrac = awake ? clamp((silenceTimer - 3000) / 4000, 0, 1) : 1;
  dissolveProgress  = lerp(dissolveProgress, silenceFrac, 0.025);
  activeLevel       = lerp(activeLevel, awake && silenceTimer < 3000 ? 1 : 0, 0.018);

  // heartbeat advance
  if (awake) {
    heartbeatPhase += dt / heartbeatPeriod;
    heartbeatPhase %= 1;
  }

  // pulse advance
  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].phase += dt / 320;    // each pulse crosses 5 rings in ~320 ms
    if (pulses[i].phase > 1.4) pulses.splice(i, 1);
  }

  // ── clear ──────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);

  // Very dim radial glow at center when alive
  if (activeLevel > 0.02) {
    const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, 160);
    grd.addColorStop(0, `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${0.04 * activeLevel})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  // ── particles ──────────────────────────────────────────────────────────
  const N = RING_DEFS.length;

  particles.forEach(p => {
    const ringIdx = p.ri;

    // heartbeat radial displacement: ring n lags behind ring 0
    const hbWave = Math.sin((heartbeatPhase - ringIdx * 0.06) * Math.PI * 2);
    const hbDisp = hbWave * 8 * activeLevel * (1 - dissolveProgress);

    // pulse displacement: traveling outward from ring 0 to ring N-1
    let pulseDisp = 0;
    for (const pulse of pulses) {
      // pulse.phase 0→1 maps to ring 0→4; each ring has a short window
      const pCenter = ringIdx / (N - 1);
      const dist = Math.abs(pulse.phase - pCenter);
      if (dist < 0.28) {
        const contrib = pulse.strength * Math.cos((dist / 0.28) * (Math.PI / 2));
        pulseDisp = Math.max(pulseDisp, contrib * 18 * (1 - dissolveProgress));
      }
    }

    // target: ring radius + wave displacement, or dissolve outward
    const formR   = p.baseR + hbDisp + pulseDisp;
    const dissR   = p.dissolveR;
    const targetR = lerp(formR, dissR, dissolveProgress);

    p.curR = lerp(p.curR, targetR, 0.06);

    // opacity: fade out toward dissolution, also dim when not yet awake
    const baseOp = p.baseOpacity * (1 - dissolveProgress) * activeLevel;
    p.opacity = lerp(p.opacity, baseOp, 0.05);

    if (p.opacity < 0.005) return;

    const px = CX + Math.cos(p.angle) * p.curR;
    const py = CY + Math.sin(p.angle) * p.curR;

    // Particle size: inner rings slightly larger
    const sz = lerp(1.8, 0.9, ringIdx / (N - 1)) * (1 - dissolveProgress * 0.4);

    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${p.opacity})`;
    ctx.fill();

    // subtle glow on innermost ring
    if (ringIdx === 0 && activeLevel > 0.3) {
      ctx.beginPath();
      ctx.arc(px, py, sz * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${p.opacity * 0.12})`;
      ctx.fill();
    }
  });

  // ── ring connectors (faint arcs between adjacent particles) ────────────
  if (activeLevel > 0.15 && dissolveProgress < 0.7) {
    RING_DEFS.forEach((def, ri) => {
      const ringParticles = particles.filter(p => p.ri === ri);
      const arcOpacity = activeLevel * (1 - dissolveProgress) * 0.055;
      if (arcOpacity < 0.005) return;
      ctx.strokeStyle = `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${arcOpacity})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ringParticles.forEach((p, i) => {
        const px = CX + Math.cos(p.angle) * p.curR;
        const py = CY + Math.sin(p.angle) * p.curR;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.stroke();
    });
  }

  // ── center pulse dot ───────────────────────────────────────────────────
  if (activeLevel > 0.05) {
    const dotBeat = 0.5 + 0.5 * Math.sin(heartbeatPhase * Math.PI * 2);
    const dotOp = dotBeat * activeLevel * (1 - dissolveProgress) * 0.6;
    const dotR  = 2.5 + dotBeat * 2.5;
    ctx.beginPath();
    ctx.arc(CX, CY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${COLOR[0]},${COLOR[1]},${COLOR[2]},${dotOp})`;
    ctx.fill();
  }
}

requestAnimationFrame(draw);
</script>

</body>
</html>
