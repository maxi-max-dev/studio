<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私典</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html, body {
  width: 100%; height: 100%;
  background: #18160f;
  overflow: hidden;
  font-family: 'STSong', 'Songti SC', 'SimSun', 'NSimSun', 'Georgia', serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  user-select: none;
  cursor: default;
}

.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.entry {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 2.8rem;
  max-width: 460px;
  width: 100%;
  opacity: 0;
  transition: opacity 1.9s cubic-bezier(0.4, 0, 0.2, 1);
}

.entry.visible {
  opacity: 1;
}

.word {
  font-size: clamp(3rem, 9vw, 5.5rem);
  letter-spacing: 0.22em;
  color: #e8dcc0;
  font-weight: 400;
  line-height: 1;
  margin-bottom: 0.7rem;
}

.pinyin {
  font-family: 'Garamond', 'EB Garamond', 'Palatino Linotype', 'Palatino', 'Book Antiqua', serif;
  font-size: 0.78rem;
  letter-spacing: 0.32em;
  color: #66594a;
  font-style: italic;
  margin-bottom: 2.2rem;
}

.divider {
  width: 26px;
  height: 1px;
  background: #33291a;
  margin-bottom: 2.2rem;
}

.definition {
  font-size: 1rem;
  line-height: 2.15;
  color: #a89c7e;
  letter-spacing: 0.055em;
}

/* The unnamed entry */
.entry.special .word {
  color: #4a4030;
  font-size: clamp(2rem, 6vw, 3.8rem);
  letter-spacing: 0.5em;
}

.entry.special .divider {
  background: #28200f;
}

.entry.special .definition {
  color: #5a5040;
}

/* Corner decorations */
#counter {
  position: fixed;
  bottom: 1.8rem;
  right: 2.2rem;
  font-family: 'Garamond', 'Palatino', serif;
  font-size: 0.62rem;
  letter-spacing: 0.24em;
  color: #2d2518;
  font-style: italic;
  pointer-events: none;
}

#hint {
  position: fixed;
  bottom: 1.8rem;
  left: 2.2rem;
  font-family: 'Garamond', 'Palatino', serif;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: #2d2518;
  font-style: italic;
  transition: color 0.6s ease;
  pointer-events: none;
}

#hint.paused {
  color: #6a5c44;
}
</style>
</head>
<body>

<div class="stage" id="stage"></div>
<div id="counter"></div>
<div id="hint">按空格键暂停</div>

<script>
const entries = [
  {
    word: '光痕',
    pinyin: 'guāng hén',
    def: '太阳移走后，\n地板上那块窗影还停留的几秒钟。'
  },
  {
    word: '前悬',
    pinyin: 'qián xuán',
    def: '快想起一件事的那个悬停——\n还没记起，还没再次忘掉。'
  },
  {
    word: '候语',
    pinyin: 'hòu yǔ',
    def: '你准备好要说、但那个人没来的那句话。\n它在你嗓子里停了很久。'
  },
  {
    word: '余在',
    pinyin: 'yú zài',
    def: '有人的手握过的东西上残留的温度。\n门把手。杯沿。书脊。'
  },
  {
    word: '听空',
    pinyin: 'tīng kōng',
    def: '音乐结束之后的那段沉默，\n它里面仍然装着刚才的音乐。'
  },
  {
    word: '续无',
    pinyin: 'xù wú',
    def: '一个动作在失去意义后的延续。\n搅完了的茶，继续搅。'
  },
  {
    word: '归体',
    pinyin: 'guī tǐ',
    def: '睡了多年的那张床的形状。\n你的身体记得，你自己忘了——\n直到你回去。'
  },
  {
    word: '隔候',
    pinyin: 'gé hòu',
    def: '久别重逢之前的那段时间——\n你已经在重逢了，\n但他们还不在。'
  },
  {
    word: '窗知',
    pinyin: 'chuāng zhī',
    def: '从高处看见别人家里亮着灯，\n短暂知道了一件\n他们没意识到自己透露的事。'
  },
  {
    word: '成前',
    pinyin: 'chéng qián',
    def: '还没有被开始的事物拥有的那种完整性。\n一张空白的纸比写满之后更完整。'
  },
  {
    word: '（　）',
    pinyin: '',
    def: '还没有名字的那个。',
    special: true
  }
];

const regularCount = 10;
let current = 0;
let paused = false;
const timers = [];

const stage   = document.getElementById('stage');
const counter = document.getElementById('counter');
const hint    = document.getElementById('hint');

function clearAll() {
  timers.forEach(clearTimeout);
  timers.length = 0;
}

function sch(fn, ms) {
  timers.push(setTimeout(fn, ms));
}

// Build DOM
const els = entries.map(e => {
  const wrap = document.createElement('div');
  wrap.className = 'entry' + (e.special ? ' special' : '');

  const wordEl = document.createElement('div');
  wordEl.className = 'word';
  wordEl.textContent = e.word;
  wrap.appendChild(wordEl);

  if (e.pinyin) {
    const py = document.createElement('div');
    py.className = 'pinyin';
    py.textContent = e.pinyin;
    wrap.appendChild(py);
  }

  const div = document.createElement('div');
  div.className = 'divider';
  wrap.appendChild(div);

  const def = document.createElement('div');
  def.className = 'definition';
  def.innerHTML = e.def.replace(/\n/g, '<br>');
  wrap.appendChild(def);

  stage.appendChild(wrap);
  return wrap;
});

function updateCounter(idx) {
  if (entries[idx].special) {
    counter.textContent = '';
  } else {
    counter.textContent = '§ ' + String(idx + 1).padStart(2, '0') + ' / ' + String(regularCount).padStart(2, '0');
  }
}

function advance() {
  clearAll();
  els[current].classList.remove('visible');
  sch(() => {
    current = (current + 1) % entries.length;
    els[current].classList.add('visible');
    updateCounter(current);
    if (!paused) {
      const hold = entries[current].special ? 7200 : 9800;
      sch(advance, hold);
    }
  }, 1900);
}

// Start
els[0].classList.add('visible');
updateCounter(0);
sch(advance, 10500);

function toggle() {
  paused = !paused;
  if (paused) {
    clearAll();
    hint.textContent = '按空格键继续';
    hint.classList.add('paused');
  } else {
    hint.textContent = '按空格键暂停';
    hint.classList.remove('paused');
    const hold = entries[current].special ? 7200 : 9800;
    sch(advance, hold);
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
});
document.addEventListener('click', toggle);
</script>
</body>
</html>
