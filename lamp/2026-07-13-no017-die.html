<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夜行图鉴 No.017 · 叠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05070e;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    canvas { position: fixed; top: 0; left: 0; display: block; }

    #ui {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Georgia', 'Noto Serif SC', 'SimSun', serif;
    }

    #label {
      position: absolute; top: 22px; left: 26px;
      font-size: 11px; letter-spacing: 0.24em;
      color: rgba(215, 190, 148, 0.32);
    }

    #big-name {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -54%);
      text-align: center;
      opacity: 0;
      transition: opacity 1.8s ease;
    }

    #big-name .kanji {
      font-size: clamp(72px, 14vw, 148px);
      color: rgba(215, 190, 148, 0.07);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    #big-name .sub {
      font-size: 12px;
      letter-spacing: 0.42em;
      color: rgba(215, 190, 148, 0.22);
      margin-top: 16px;
    }

    #big-name.show { opacity: 1; }

    #notes {
      position: absolute; bottom: 34px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 13px; line-height: 2.2;
      color: rgba(215, 190, 148, 0);
      transition: color 3.5s ease;
      white-space: nowrap;
    }

    #notes.show { color: rgba(215, 190, 148, 0.44); }

    .hint {
      font-size: 11px; letter-spacing: 0.14em;
      opacity: 0.48; margin-top: 8px;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="label">夜行图鉴 · No.017</div>

  <div id="big-name">
    <div class="kanji">叠</div>
    <div class="sub">干 涉 体</div>
  </div>

  <div id="notes">
    叠没有自己的身体。<br>
    它活在两个振源相遇、波纹叠加后产生的亮纹里。<br>
    移开其中一个振源，它立刻消失。<br>
    它的身体是关系本身。
    <div class="hint">· 拖动振源可以改变它的形状 ·</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const bigName = document.getElementById('big-name');
const notes   = document.getElementById('notes');

// Low-res offscreen canvas for interference pattern
const off    = document.createElement('canvas');
const offCtx = off.getContext('2d');
const SCALE  = 3; // render at 1/3 resolution, scale up pixelated

let W = 0, H = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  off.width     = Math.ceil(W / SCALE);
  off.height    = Math.ceil(H / SCALE);
}
resize();
window.addEventListener('resize', resize);

// Two wave sources (fractional screen coords)
const S = [
  { x: 0.34, y: 0.5 },
  { x: 0.66, y: 0.5 }
];
// Very slow drift velocities
const V = [
  { vx:  0.000048, vy:  0.000062 },
  { vx: -0.000052, vy: -0.000038 }
];

let drag = -1;

function findSrc(mx, my) {
  for (let i = 0; i < 2; i++) {
    if (Math.hypot(mx - S[i].x * W, my - S[i].y * H) < 38) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown',  e => { drag = findSrc(e.clientX, e.clientY); });
canvas.addEventListener('mousemove',  e => {
  if (drag < 0) return;
  S[drag].x = Math.max(0.06, Math.min(0.94, e.clientX / W));
  S[drag].y = Math.max(0.06, Math.min(0.94, e.clientY / H));
});
canvas.addEventListener('mouseup',   () => { drag = -1; });
canvas.addEventListener('mouseleave',() => { drag = -1; });

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  drag = findSrc(t.clientX, t.clientY);
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (drag < 0) return;
  const t = e.touches[0];
  S[drag].x = Math.max(0.06, Math.min(0.94, t.clientX / W));
  S[drag].y = Math.max(0.06, Math.min(0.94, t.clientY / H));
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { drag = -1; });

// Timing
setTimeout(() => bigName.classList.add('show'),  280);
setTimeout(() => bigName.classList.remove('show'), 4200);
setTimeout(() => notes.classList.add('show'), 22000);

// Wave physics
const K  = 0.033;   // wave number  (λ ≈ 190px at full res)
const OM = 0.0015;  // time frequency

let t = 0;

function render() {
  const OW = off.width;
  const OH = off.height;

  const imgData = offCtx.createImageData(OW, OH);
  const d = imgData.data;

  // Source positions in full-res pixels
  const x1 = S[0].x * W, y1 = S[0].y * H;
  const x2 = S[1].x * W, y2 = S[1].y * H;

  for (let py = 0; py < OH; py++) {
    const ry = py * SCALE;
    const dy1 = ry - y1, dy2 = ry - y2;
    const dy1sq = dy1 * dy1, dy2sq = dy2 * dy2;

    for (let px = 0; px < OW; px++) {
      const rx = px * SCALE;
      const dx1 = rx - x1, dx2 = rx - x2;

      const r1 = Math.sqrt(dx1 * dx1 + dy1sq);
      const r2 = Math.sqrt(dx2 * dx2 + dy2sq);

      // Two coherent waves; sum ∈ [-2, 2]
      const sum = Math.sin(K * r1 - OM * t) + Math.sin(K * r2 - OM * t);

      // Normalize to [0,1] and cube for contrast
      const br  = (sum + 2) * 0.25;
      const b3  = br * br * br;

      const idx = (py * OW + px) * 4;
      d[idx]   = (b3 * 238) | 0;                        // R – pale gold
      d[idx+1] = (b3 * 215) | 0;                        // G
      d[idx+2] = (b3 * 138 + (1 - br) * 42) | 0;       // B – indigo in darks
      d[idx+3] = 255;
    }
  }

  offCtx.putImageData(imgData, 0, 0);

  // Scale up – pixelated / no smoothing
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, W, H);

  // Source indicator dots (on main canvas at full res)
  for (const s of S) {
    const sx = s.x * W, sy = s.y * H;

    ctx.beginPath();
    ctx.arc(sx, sy, 4, 0, 6.2832);
    ctx.fillStyle = 'rgba(218, 185, 108, 0.6)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sx, sy, 14, 0, 6.2832);
    ctx.strokeStyle = 'rgba(218, 185, 108, 0.16)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Drift (only when not dragging)
  if (drag < 0) {
    for (let i = 0; i < 2; i++) {
      S[i].x += V[i].vx;
      S[i].y += V[i].vy;
      if (S[i].x < 0.1 || S[i].x > 0.9) V[i].vx *= -1;
      if (S[i].y < 0.1 || S[i].y > 0.9) V[i].vy *= -1;
    }
  }

  t++;
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
