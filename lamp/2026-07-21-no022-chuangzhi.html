<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>窗知 · 私典</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}
#ui {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.txt {
  position: absolute; left: 50%;
  transform: translateX(-50%);
  text-align: center; white-space: pre-line;
  font-family: 'STSong', 'Songti SC', 'SimSun', Georgia, serif;
  font-size: clamp(0.85rem, 2vw, 1rem);
  letter-spacing: 0.25em; line-height: 2.4;
  color: #9a8c78;
  opacity: 0; transition: opacity 2.8s ease;
  width: 80%;
}
.txt.on { opacity: 1; }

#final {
  position: absolute; left: 50%;
  transform: translateX(-50%);
  bottom: 17%; text-align: center;
  opacity: 0; transition: opacity 5.5s ease;
  width: 90%;
}
.wrd {
  display: block;
  font-family: 'STSong', 'Songti SC', Georgia, serif;
  font-size: clamp(2rem, 4.5vw, 3rem);
  letter-spacing: 0.75em; padding-left: 0.75em;
  color: #b89a60;
  margin-bottom: 1.8rem;
}
.def {
  display: block;
  font-family: 'STSong', 'Songti SC', Georgia, serif;
  font-size: clamp(0.7rem, 1.5vw, 0.82rem);
  letter-spacing: 0.14em; line-height: 2.6;
  color: #5a5248;
}

#tag {
  position: absolute; top: 1.6rem; right: 2rem;
  font-size: 0.58rem; letter-spacing: 0.18em;
  color: #111124;
  font-family: Georgia, serif;
  user-select: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="txt" id="t1" style="top:25%">你从高处往下看——</div>
  <div class="txt" id="t2" style="top:25%">有扇窗亮着。</div>
  <div class="txt" id="t3" style="top:67%">他们也在看窗外。</div>
  <div class="txt" id="t4" style="top:67%">你们正在看<br>同一个夜晚。</div>
  <div class="txt" id="t5" style="top:67%">这件事，<br>他们不知道。</div>
  <div id="final">
    <span class="wrd">窗 知</span>
    <span class="def">从高处看见别人家里亮着灯，<br>短暂知道了一件他们没意识到自己透露的事。</span>
  </div>
  <div id="tag">§ 私典 · 窗知</div>
</div>

<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W, H;
function resize() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
resize();
addEventListener('resize', resize);

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }

// ── state ──
let bt = 0;
let silA = 0;
let winB = 1;

const t0 = performance.now();
function now() { return (performance.now() - t0) / 1000; }

const done = new Set();
function once(k, when, fn) {
  const t = now();
  if (t >= when && !done.has(k)) { done.add(k); fn(); }
}

const T = [1,2,3,4,5].map(n => document.getElementById('t' + n));
const F = document.getElementById('final');
const show = i => T[i].classList.add('on');
const hide = i => T[i].classList.remove('on');

// ── layout ──
function getL() {
  const cx = W * 0.5;
  const bw = W * 0.14;
  const bh = H * 0.52;
  const bx = cx - bw * 0.5;
  const by = H * 0.18;
  const rows = 5, cols = 3;
  const gx = bw / (cols + 1);
  const gy = bh / (rows + 1);
  const ww = gx * 0.52;
  const wh = gy * 0.48;
  // lit window: row 2, col 1 (center column, 3rd from top)
  const lx = bx + gx * 2 - ww * 0.5;
  const lwy = by + gy * 3 - wh * 0.5;
  return { cx, bx, by, bw, bh, rows, cols, gx, gy, ww, wh, lx, lwy };
}

// ── draw ──
function drawFrame() {
  const t = now();
  bt += 0.016;
  silA = clamp((t - 11) / 3, 0, 1);
  winB = t > 32 ? clamp(1 - (t - 32) / 5, 0, 1) : 1;

  // sequence
  once('s1', 2.5,  () => show(0));
  once('h1', 7.5,  () => hide(0));
  once('s2', 8.2,  () => show(1));
  once('h2', 13.5, () => hide(1));
  once('s3', 15.5, () => show(2));
  once('h3', 20.5, () => hide(2));
  once('s4', 21.5, () => show(3));
  once('h4', 27.5, () => hide(3));
  once('s5', 28.5, () => show(4));
  once('h5', 33.5, () => hide(4));
  once('fw', 39.5, () => { F.style.opacity = '1'; });

  const L = getL();
  const { cx, bx, by, bw, bh, rows, cols, gx, gy, ww, wh, lx, lwy } = L;

  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#04050c');
  sky.addColorStop(0.6, '#060810');
  sky.addColorStop(1,   '#030405');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // faint stars
  for (let i = 0; i < 48; i++) {
    const sx = ((Math.sin(i * 127.1 + 0.5) * 0.5 + 0.5)) * W;
    const sy = ((Math.cos(i * 89.7 + 1.2) * 0.5 + 0.5)) * H * 0.48;
    const sr = 0.35 + (Math.sin(i * 41.3) * 0.5 + 0.5) * 0.55;
    const sa = 0.04 + (Math.cos(i * 73.1) * 0.5 + 0.5) * 0.08;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 215, 255, ' + sa + ')';
    ctx.fill();
  }

  // ── buildings ──
  // left cluster
  ctx.fillStyle = '#090a12';
  ctx.fillRect(0, H * 0.42, cx * 0.5, H * 0.44);
  ctx.fillStyle = '#0b0c14';
  ctx.fillRect(cx * 0.25, H * 0.28, cx * 0.32, H * 0.58);

  // right cluster
  ctx.fillStyle = '#0a0b13';
  ctx.fillRect(cx + bw * 0.55, H * 0.45, W * 0.19, H * 0.41);
  ctx.fillStyle = '#080910';
  ctx.fillRect(cx + bw * 0.55 + W * 0.14, H * 0.31, W * 0.24, H * 0.55);

  // center building
  ctx.fillStyle = '#0f1019';
  ctx.fillRect(bx, by, bw, bh);

  // ── dark windows (grid) ──
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (r === 2 && c === 1) continue; // lit window skip
      const wx = bx + gx * (c + 1) - ww * 0.5;
      const wy = by + gy * (r + 1) - wh * 0.5;
      // a few windows faintly occupied (warm very dim)
      const faint = [0, 4, 7, 11, 13].includes(r * cols + c);
      ctx.fillStyle = faint ? '#161410' : '#07080f';
      ctx.fillRect(wx, wy, ww, wh);
    }
  }

  // ── lit window ──
  if (winB > 0) {
    // outer glow
    const gr = ww * 5.5;
    const grd = ctx.createRadialGradient(
      lx + ww * 0.5, lwy + wh * 0.5, 0,
      lx + ww * 0.5, lwy + wh * 0.5, gr
    );
    grd.addColorStop(0,   'rgba(248, 208, 110, ' + (0.14 * winB) + ')');
    grd.addColorStop(0.3, 'rgba(238, 182, 75,  ' + (0.05 * winB) + ')');
    grd.addColorStop(1,   'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(lx - gr, lwy - gr, ww + gr * 2, wh + gr * 2);

    // window face
    const ri = lerp(55, 252, winB) | 0;
    const gi = lerp(38, 218, winB) | 0;
    const bi = lerp(8,  108, winB) | 0;
    ctx.fillStyle = 'rgb(' + ri + ',' + gi + ',' + bi + ')';
    ctx.fillRect(lx, lwy, ww, wh);

    // silhouette (person at window, looking out)
    if (silA > 0) {
      ctx.save();
      ctx.globalAlpha = silA * winB;
      ctx.beginPath();
      ctx.rect(lx, lwy, ww, wh);
      ctx.clip();

      // breathing offset (very slow, very small)
      const breathY = Math.sin(bt * 0.32) * 0.9;
      const px = lx + ww * 0.48;
      const py = lwy + wh * 0.08 + breathY;
      const hr = ww * 0.175;

      // head
      ctx.beginPath();
      ctx.arc(px, py + hr, hr, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(22, 14, 4, 0.82)';
      ctx.fill();

      // shoulders + torso
      ctx.fillStyle = 'rgba(22, 14, 4, 0.72)';
      ctx.fillRect(px - ww * 0.13, py + hr * 2.1, ww * 0.27, wh * 0.38);

      ctx.restore();
    }
  }

  // ── black fade-in overlay ──
  const fa = clamp(1 - (t - 0.4) / 2.2, 0, 1);
  if (fa > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + fa + ')';
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(drawFrame);
}

drawFrame();
</script>
</body>
</html>
