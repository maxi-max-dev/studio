<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>夜行图鉴 · No.003 · 昙</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #010108; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; cursor: crosshair; }
#label {
  position: fixed;
  top: 24px;
  left: 30px;
  color: rgba(215, 192, 138, 0.2);
  font: 11px/1 'Georgia', serif;
  letter-spacing: 0.22em;
  pointer-events: none;
  user-select: none;
}
#hint {
  position: fixed;
  bottom: 28px;
  width: 100%;
  text-align: center;
  color: rgba(215, 192, 138, 0.22);
  font: 12px/1 'Georgia', serif;
  letter-spacing: 0.18em;
  pointer-events: none;
  user-select: none;
  animation: fadeHint 2.2s 7s forwards ease-in;
}
@keyframes fadeHint { to { opacity: 0; } }
</style>
</head>
<body>
<div id="label">夜行图鉴 · No.003 · 昙</div>
<canvas id="c"></canvas>
<div id="hint">点一下，让它活一瞬</div>

<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

let W, H;
function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let blooms = [];
let globalTime = 0;

document.addEventListener('click', () => spawnBloom(W / 2, H / 2));
document.addEventListener('touchstart', () => spawnBloom(W / 2, H / 2));

function spawnBloom(cx, cy) {
  const primCount = 5 + Math.floor(Math.random() * 4);
  const secCount  = 4 + Math.floor(Math.random() * 4);
  const tendrils  = [];

  for (let i = 0; i < primCount; i++) {
    const a = (i / primCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.38;
    tendrils.push({
      angle:   a,
      length:  140 + Math.random() * 130,
      curve:   (Math.random() - 0.5) * 0.5,
      hue:     50 + Math.random() * 160,
      thick:   2 + Math.random() * 1.8,
      delay:   Math.random() * 0.07,
      primary: true,
    });
  }

  for (let i = 0; i < secCount; i++) {
    tendrils.push({
      angle:   Math.random() * Math.PI * 2,
      length:  48 + Math.random() * 80,
      curve:   (Math.random() - 0.5) * 0.7,
      hue:     28 + Math.random() * 205,
      thick:   0.7 + Math.random() * 1.1,
      delay:   0.07 + Math.random() * 0.14,
      primary: false,
    });
  }

  blooms.push({
    cx, cy,
    tendrils,
    age: 0,
    ringR: 4,
    ringAlpha: 0.88,
    particles: [],
    particlesSpawned: false,
  });
}

function updateBloom(b, dt) {
  b.age += dt;

  if (b.age > 0.38 && !b.particlesSpawned) {
    b.particlesSpawned = true;
    for (const t of b.tendrils) {
      if (!t.primary) continue;
      const ex = b.cx + Math.cos(t.angle) * t.length;
      const ey = b.cy + Math.sin(t.angle) * t.length;
      for (let i = 0; i < 5; i++) {
        const a  = t.angle + (Math.random() - 0.5) * 1.5;
        const sp = 0.5 + Math.random() * 2;
        b.particles.push({
          x: ex + (Math.random() - 0.5) * 14,
          y: ey + (Math.random() - 0.5) * 14,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          hue:  t.hue,
          life: 0.75 + Math.random() * 0.25,
          decay: 0.0038 + Math.random() * 0.005,
        });
      }
    }
  }

  for (const p of b.particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.975;
    p.life -= p.decay;
  }
  b.particles = b.particles.filter(p => p.life > 0);

  b.ringR     += dt * 245;
  b.ringAlpha  = Math.max(0, 0.88 - b.age * 0.52);
}

function drawBloom(b) {
  const { cx, cy, age } = b;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // ── Tendrils ──
  for (const t of b.tendrils) {
    const ta   = Math.max(0, age - t.delay);
    const grow = Math.min(1, ta / 0.36);

    const alpha = age < 0.55
      ? Math.min(1, ta / 0.22)
      : Math.max(0, 1 - (age - 0.55) / (t.primary ? 2.1 : 1.45));

    if (alpha < 0.01 || grow < 0.01) continue;

    const len = t.length * grow;
    const ex  = cx + Math.cos(t.angle) * len;
    const ey  = cy + Math.sin(t.angle) * len;
    const cpx = cx + Math.cos(t.angle + t.curve) * len * 0.5;
    const cpy = cy + Math.sin(t.angle + t.curve) * len * 0.5;

    const g = ctx.createLinearGradient(cx, cy, ex, ey);
    g.addColorStop(0,    `hsla(52, 88%, 92%, ${alpha * 0.82})`);
    g.addColorStop(0.38, `hsla(${t.hue * 0.4 + 36}, 84%, 76%, ${alpha * 0.55})`);
    g.addColorStop(1,    `hsla(${t.hue}, 72%, 64%, 0)`);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(cpx, cpy, ex, ey);
    ctx.strokeStyle = g;
    ctx.lineWidth   = t.thick * (0.25 + 0.75 * alpha);
    ctx.lineCap     = 'round';
    ctx.stroke();

    // Tip bloom on primary tendrils
    if (t.primary && grow > 0.82 && alpha > 0.12) {
      const tg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 17);
      tg.addColorStop(0, `hsla(${t.hue}, 78%, 74%, ${alpha * 0.45})`);
      tg.addColorStop(1, `hsla(${t.hue}, 78%, 74%, 0)`);
      ctx.beginPath();
      ctx.arc(ex, ey, 17, 0, Math.PI * 2);
      ctx.fillStyle = tg;
      ctx.fill();
    }
  }

  // ── Core ──
  const coreFade = age < 0.13
    ? age / 0.13
    : age < 2.0
    ? 1
    : Math.max(0, 1 - (age - 2.0) / 1.0);

  if (coreFade > 0.01) {
    const pulse   = age < 0.13 ? 5 + 32 * (age / 0.13) : 37;
    const isFlash = age < 0.26;
    const cg      = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 5.5);
    cg.addColorStop(0,    `hsla(56, ${isFlash ? 18 : 58}%, ${isFlash ? 96 : 85}%, ${coreFade * 0.94})`);
    cg.addColorStop(0.17, `hsla(46, 86%, 77%, ${coreFade * 0.56})`);
    cg.addColorStop(0.52, `hsla(40, 78%, 62%, ${coreFade * 0.18})`);
    cg.addColorStop(1,    `hsla(38, 70%, 54%, 0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, pulse * 5.5, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
  }

  // ── Ring pulse ──
  if (b.ringAlpha > 0.01) {
    ctx.beginPath();
    ctx.arc(cx, cy, b.ringR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 238, 174, ${b.ringAlpha * 0.52})`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
  }

  // ── Scatter particles ──
  for (const p of b.particles) {
    const a = p.life * 0.72;
    if (a < 0.01) continue;
    const r = 1.1 + p.life * 2.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 80%, 73%, ${a})`;
    ctx.fill();

    const hg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3.8);
    hg.addColorStop(0, `hsla(${p.hue}, 78%, 72%, ${a * 0.28})`);
    hg.addColorStop(1, `hsla(${p.hue}, 78%, 72%, 0)`);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 3.8, 0, Math.PI * 2);
    ctx.fillStyle = hg;
    ctx.fill();
  }

  ctx.restore();
}

// Barely-there breathing glow — 昙 almost isn't there
function drawBreathing() {
  const breath = 0.5 + 0.5 * Math.sin(globalTime * 0.65);
  const a      = 0.022 + breath * 0.018; // max ~4%
  const r      = 28 + breath * 12;
  const g      = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, r);
  g.addColorStop(0, `rgba(212, 185, 118, ${a})`);
  g.addColorStop(1, 'rgba(212, 185, 118, 0)');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, r, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

let lastT = null;
function loop(t) {
  const dt = lastT !== null ? Math.min((t - lastT) / 1000, 0.05) : 0;
  lastT = t;
  globalTime += dt;

  ctx.fillStyle = '#010108';
  ctx.fillRect(0, 0, W, H);

  drawBreathing();

  for (const b of blooms) {
    updateBloom(b, dt);
    if (b.age < 3.4) drawBloom(b);
  }
  blooms = blooms.filter(b => b.age < 3.4);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
