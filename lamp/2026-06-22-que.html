<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>夜行图鉴 · No.004 · 怯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #020a0e; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; cursor: none; }
#label {
  position: fixed; top: 24px; left: 30px;
  color: rgba(160, 210, 230, 0.16);
  font: 11px/1 'Georgia', serif;
  letter-spacing: 0.22em;
  pointer-events: none; user-select: none;
}
#hint {
  position: fixed; bottom: 28px; width: 100%; text-align: center;
  color: rgba(160, 210, 230, 0.19);
  font: 12px/1 'Georgia', serif;
  letter-spacing: 0.18em;
  pointer-events: none; user-select: none;
  animation: fadeHint 2s 10s forwards ease-in;
}
@keyframes fadeHint { to { opacity: 0; } }
</style>
</head>
<body>
<div id="label">夜行图鉴 · No.004 · 怯</div>
<canvas id="c"></canvas>
<div id="hint">靠近，它就退开</div>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W, H, CX, CY;
function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

let mx = 0, my = 0, mPresent = false;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; mPresent = true; });
document.addEventListener('mouseleave', () => { mPresent = false; });
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY; mPresent = true;
}, { passive: true });
document.addEventListener('touchend', () => { mPresent = false; });

function mothPoints() {
  const p = [];
  // Body: 6 vertical points
  for (let i = 0; i < 6; i++) p.push([0, -45 + i * 17]);
  // Upper wings
  for (const s of [-1, 1]) {
    for (let i = 0; i <= 13; i++) {
      const a = Math.PI * 0.5 + (i / 13) * Math.PI;
      const x = s * (-Math.cos(a)) * 108;
      const y = Math.sin(a) * 62 - 12;
      if (s * x > 0 || i === 0 || i === 13) p.push([x, y]);
    }
  }
  // Lower wings
  for (const s of [-1, 1]) {
    for (let i = 0; i <= 9; i++) {
      const a = Math.PI * 0.5 + (i / 9) * Math.PI;
      const x = s * (-Math.cos(a)) * 72;
      const y = Math.sin(a) * 42 + 25;
      if (s * x > 0 || i === 0 || i === 9) p.push([x, y]);
    }
  }
  // Antennae
  for (let i = 1; i <= 5; i++) {
    const f = i / 5;
    p.push([-6 - f * 32, -48 - f * 40 + f * f * 12]);
    p.push([6 + f * 32, -48 - f * 40 + f * f * 12]);
  }
  return p;
}

class Particle {
  constructor(hx, hy, isWing, isAntenna) {
    this.hx = hx; this.hy = hy;
    this.x = hx; this.y = hy;
    this.r = 1.0 + Math.random() * 1.7;
    this.hue = 185 + Math.random() * 30;
    this.ph = Math.random() * Math.PI * 2;
    this.ds = 0.22 + Math.random() * 0.4;
    this.dr = 1.0 + Math.random() * 1.5;
    this.isWing = isWing;
    this.isAntenna = isAntenna;
    this.tpx = Math.random() * 100;
    this.tpy = Math.random() * 100;
  }

  update(t, fear) {
    let hx = this.hx;
    let hy = this.hy;

    if (this.isWing) {
      // Wings fold inward and tips droop under fear
      hx = this.hx * (1 - fear * 0.42);
      hy = this.hy + Math.abs(this.hx) * fear * 0.28;
    }
    if (this.isAntenna) {
      // Antennae droop toward horizontal
      const droop = fear * 0.7;
      hx = this.hx * (1 - droop * 0.2);
      hy = this.hy + (5 - this.hy) * droop;
    }

    // Breathing — suppressed when scared
    const breathAmp = 1 - fear * 0.55;
    const bx = Math.sin(t * this.ds + this.ph) * this.dr * breathAmp;
    const by = Math.cos(t * this.ds * 0.75 + this.ph * 1.3) * this.dr * breathAmp;

    // High-frequency trembling when terrified
    const tremAmp = fear * fear * 3.4;
    const tx = Math.sin(t * 19.4 + this.tpx) * tremAmp;
    const ty = Math.sin(t * 22.1 + this.tpy) * tremAmp;

    // Faster spring when scared (urgency), slower when calm
    const spring = 0.045 + fear * 0.13;
    this.x += (hx + bx + tx - this.x) * spring;
    this.y += (hy + by + ty - this.y) * spring;
  }

  draw(t, fear, bX, bY) {
    const pulse = 0.82 + 0.18 * Math.sin(t * 1.6 + this.ph);
    const alpha = pulse * 0.88;
    if (alpha < 0.01) return;
    const hue = this.hue + Math.sin(t * 0.25 + this.ph) * 12;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = `hsl(${hue}, 58%, 72%)`;
    ctx.shadowBlur = this.r * (4.5 + fear * 3.5);
    ctx.fillStyle = `hsl(${hue}, 26%, 90%)`;
    ctx.beginPath();
    ctx.arc(CX + bX + this.x, CY + bY + this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const pts = mothPoints();
// Wings: indices 6–53 (upper 28 + lower 20), antennae: 54+
const particles = pts.map(([x, y], idx) =>
  new Particle(x, y, idx >= 6 && idx < 54, idx >= 54)
);
// Ambient halo (not wings, not antennae — unaffected by folding)
for (let i = 0; i < 12; i++) {
  const a = (i / 12) * Math.PI * 2;
  const r = 118 + (i % 3) * 11;
  particles.push(new Particle(Math.cos(a) * r, Math.sin(a) * r, false, false));
}

// Body position: the whole creature moves as a unit
let bX = 0, bY = 0, bVX = 0, bVY = 0;
let fear = 0;
// Direction creature watches after you leave
let exitDX = 0, exitDY = 0;

function updateBody(t) {
  let tX = 0, tY = 0, tFear = 0;

  if (mPresent) {
    // Vector from creature center to cursor
    const dx = mx - (CX + bX);
    const dy = my - (CY + bY);
    const d = Math.hypot(dx, dy);
    const nearness = Math.max(0, 1 - d / 360);
    tFear = nearness;

    if (nearness > 0.015) {
      const nx = dx / Math.max(d, 1);
      const ny = dy / Math.max(d, 1);
      // Flee to opposite side — maintain form, move as whole
      tX = -nx * 192 * nearness;
      tY = -ny * 192 * nearness;
      // Remember which direction you came from
      exitDX = nx * 50;
      exitDY = ny * 50;
    }
  } else {
    // When alone: slight lean toward where you left + slow nervous drift
    tX = exitDX * 0.2 + Math.sin(t * 0.13 + 2.7) * 7;
    tY = exitDY * 0.2 + Math.cos(t * 0.17 + 1.1) * 5;
  }

  // Fast to fear, slow to calm
  const fearRate = tFear > fear ? 0.15 : 0.02;
  fear += fearRate * (tFear - fear);

  // Stiff spring when fleeing, loose when returning
  const k = mPresent ? 0.11 : 0.015;
  bVX = bVX * 0.80 + (tX - bX) * k;
  bVY = bVY * 0.80 + (tY - bY) * k;
  bX += bVX;
  bY += bVY;
}

// Ghost trail of recent body positions
const TRAIL = 10;
const trailBuf = Array.from({length: TRAIL}, () => ({x: 0, y: 0}));
let trailHead = 0;

function drawTrail() {
  const spd = Math.hypot(bVX, bVY);
  if (fear < 0.12 || spd < 0.5) return;
  for (let i = 1; i < TRAIL; i++) {
    const idx = (trailHead - i + TRAIL) % TRAIL;
    const pos = trailBuf[idx];
    const age = i / TRAIL;
    const alpha = fear * (1 - age) * spd * 0.011;
    if (alpha < 0.002) continue;
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 0.052);
    const g = ctx.createRadialGradient(CX + pos.x, CY + pos.y, 0, CX + pos.x, CY + pos.y, 85);
    g.addColorStop(0, 'rgba(130, 200, 228, 1)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX + pos.x, CY + pos.y, 85, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawAura() {
  const a = 0.026 + fear * 0.016;
  const g = ctx.createRadialGradient(CX + bX, CY + bY, 0, CX + bX, CY + bY, 140);
  g.addColorStop(0, `rgba(110, 195, 228, ${a})`);
  g.addColorStop(0.6, `rgba(70, 145, 195, ${a * 0.4})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(CX + bX, CY + bY, 140, 0, Math.PI * 2);
  ctx.fill();
}

function drawCursor() {
  if (!mPresent) return;
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = 'rgba(130, 185, 210, 0.8)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(mx, my, 3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

let t = 0;

function loop() {
  ctx.fillStyle = 'rgba(2, 10, 14, 0.22)';
  ctx.fillRect(0, 0, W, H);
  t += 0.016;

  updateBody(t);

  // Draw trail before recording current position (shows only past frames)
  drawTrail();
  drawAura();
  particles.forEach(p => { p.update(t, fear); p.draw(t, fear, bX, bY); });
  drawCursor();

  // Record body position at end of frame
  trailBuf[trailHead] = {x: bX, y: bY};
  trailHead = (trailHead + 1) % TRAIL;

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
