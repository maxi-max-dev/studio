<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夜晷</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; overflow: hidden; }
    body {
      background: linear-gradient(180deg, #050810 0%, #0d1428 100%);
      transition: background 3s linear;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    #stars {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
    }
    @keyframes twinkle {
      from { opacity: var(--lo); }
      to   { opacity: var(--hi); }
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) var(--dl) ease-in-out infinite alternate;
    }
    #moon {
      position: fixed; z-index: 2;
      pointer-events: none;
      transition: opacity 30s ease;
    }
    #horizon-glow {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 45vh; z-index: 3;
      pointer-events: none;
    }
    #main {
      position: fixed; inset: 0; z-index: 4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      user-select: none;
    }
    #lbl {
      font-size: 10px;
      letter-spacing: 7px;
      color: rgba(255,255,255,0.20);
      margin-bottom: 30px;
      cursor: pointer;
      transition: color 0.4s ease;
    }
    #lbl:hover { color: rgba(255,255,255,0.40); }
    #time {
      font-size: clamp(68px, 13vw, 120px);
      font-weight: 200;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.90);
      line-height: 1;
      margin-bottom: 34px;
      font-variant-numeric: tabular-nums;
      cursor: default;
    }
    #time.show-sec::after {
      content: attr(data-s);
      font-size: 0.32em;
      vertical-align: super;
      opacity: 0.45;
      letter-spacing: 0;
      margin-left: 0.08em;
    }
    #desc {
      font-family: 'Songti SC', 'STSong', 'SimSun', Georgia, serif;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 400;
      color: rgba(255,255,255,0.56);
      letter-spacing: 0.1em;
      line-height: 2;
      text-align: center;
      max-width: 22em;
      margin-bottom: 26px;
      transition: opacity 0.7s ease;
    }
    #cdwn {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.20);
      font-weight: 300;
      min-height: 1.4em;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="stars"></div>

  <div id="moon">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <defs>
        <mask id="moon-mask">
          <rect width="52" height="52" fill="white"/>
          <circle cx="34" cy="21" r="21" fill="black"/>
        </mask>
      </defs>
      <circle cx="23" cy="28" r="20" fill="rgba(255,248,210,0.82)" mask="url(#moon-mask)"/>
    </svg>
  </div>

  <div id="horizon-glow"></div>

  <div id="main">
    <div id="lbl">夜 晷</div>
    <div id="time" data-s="">--:--</div>
    <div id="desc">……</div>
    <div id="cdwn"></div>
  </div>

  <script>
  // ── Sky keyframes: [hour, topRGB, botRGB, starAlpha] ──────────────
  const SKY = [
    [0,   [4,  6,  18],  [8,  12, 32],  1.00],
    [3,   [3,  4,  12],  [5,  8,  22],  1.00],
    [5,   [7,  11, 28],  [14, 18, 50],  0.82],
    [5.5, [15, 21, 52],  [32, 33, 86],  0.46],
    [6,   [33, 43, 86],  [66, 53, 106], 0.14],
    [6.5, [52, 72, 126], [106,88, 126], 0.0],
    [7,   [72, 102,150], [146,130,150], 0.0],
    [9,   [85, 122,191], [166,191,212], 0.0],
    [12,  [62, 112,190], [150,181,212], 0.0],
    [17,  [77, 127,196], [171,196,217], 0.0],
    [18,  [190,122,52],  [210,151,71],  0.0],
    [18.5,[190,82, 36],  [220,111,52],  0.0],
    [19,  [140,56, 52],  [170,72, 72],  0.06],
    [19.5,[72, 26, 76],  [111,46, 95],  0.24],
    [20,  [36, 14, 56],  [56, 18, 76],  0.58],
    [21,  [13, 9,  27],  [22, 13, 42],  0.84],
    [22,  [6,  10, 21],  [10, 15, 33],  0.97],
    [24,  [4,  6,  18],  [8,  12, 32],  1.00],
  ]

  // ── Time descriptions ──────────────────────────────────────────────
  const DESC = [
    [0,    "午夜。一天在这里折叠。"],
    [0.5,  "午夜刚过，安静得能听见自己的想法。"],
    [1,    "凌晨一点，大多数人已在梦里。"],
    [1.5,  "深夜，时间在放慢脚步。"],
    [2,    "凌晨两点——光线最淡，意识最薄。"],
    [2.5,  "深夜两点半，连失眠的人也在犹豫。"],
    [3,    "凌晨三点，最接近虚无的时候。"],
    [3.5,  "夜已老，黎明还有几个小时。"],
    [4,    "凌晨四点，连失眠的人也开始困了。"],
    [4.5,  "夜的末尾，快了。"],
    [5,    "东边的黑开始变色，天快亮了。"],
    [5.5,  "黎明正在发生。"],
    [6,    "天亮了。一夜结束。"],
    [6.5,  "清晨，光在地面上走动。"],
    [7,    "早上七点，世界正在重新启动。"],
    [8,    "上午，事情开始变得具体。"],
    [9,    "上午九点，白天的节奏已全面接管。"],
    [10,   "上午十点，日光最干净的时候。"],
    [11,   "临近正午。"],
    [12,   "正午。光垂直落下，没有影子。"],
    [13,   "午后，能量开始缓缓下坡。"],
    [14,   "下午两点，最容易犯困的时刻。"],
    [15,   "下午三点，午后的惰性还没散。"],
    [16,   "下午四点，光开始有了角度。"],
    [17,   "下午五点，阳光变成金色。"],
    [17.5, "黄昏将近，光在慢慢退场。"],
    [18,   "黄昏。"],
    [18.5, "日落时分，天边有余晖。"],
    [19,   "天色深了，橙红正在褪去。"],
    [19.5, "暮色四合，一天的颜色在变深。"],
    [20,   "入夜。城市换上另一种光源。"],
    [20.5, "夜的第一个小时，还带着白天的余温。"],
    [21,   "夜深了，世界安静下来。"],
    [21.5, "深夜，喧嚣在消退。"],
    [22,   "这一天最后的时光。"],
    [22.5, "夜越来越深。"],
    [23,   "午夜将至，一天走到终点。"],
    [23.5, "午夜还差半小时。"],
  ]

  // ── Hidden secrets (click 夜晷 to reveal) ─────────────────────────
  const SECRETS = [
    [0,    "你也睡不着吗"],
    [5.5,  "一起看天亮"],
    [6.5,  "早啊"],
    [9,    "今天过得怎样"],
    [12,   "吃饭了吗"],
    [17,   "快回家了"],
    [19.5, "一天就这样结束了"],
    [21,   "最后的清醒时光"],
    [22.5, "还不睡吗"],
  ]

  // ── Helpers ───────────────────────────────────────────────────────
  const lerp  = (a, b, t) => a + (b - a) * t
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v))
  const rgb   = ([r,g,b]) => `rgb(${r},${g},${b})`

  function lerpRGB(c1, c2, t) {
    return c1.map((v, i) => Math.round(lerp(v, c2[i], t)))
  }

  function getSky(h) {
    for (let i = 0; i < SKY.length - 1; i++) {
      const [h1, top1, bot1, s1] = SKY[i]
      const [h2, top2, bot2, s2] = SKY[i+1]
      if (h >= h1 && h < h2) {
        const t = (h - h1) / (h2 - h1)
        return { top: lerpRGB(top1,top2,t), bot: lerpRGB(bot1,bot2,t), stars: lerp(s1,s2,t) }
      }
    }
    return { top: SKY[0][1], bot: SKY[0][2], stars: SKY[0][3] }
  }

  function pick(table, h) {
    let out = table[0][1]
    for (const [dh, txt] of table) { if (dh <= h) out = txt }
    return out
  }

  function fmtHours(fh) {
    if (fh <= 0) fh = 0
    const total = Math.ceil(fh * 60)
    const h = Math.floor(total / 60), m = total % 60
    if (h === 0) return `${m} 分钟`
    if (m === 0) return `${h} 小时`
    return `${h} 小时 ${m} 分`
  }

  function getCountdown(h) {
    const DAWN = 5.5, DUSK = 20
    if (h < DAWN)  return `距黎明 ${fmtHours(DAWN - h)}`
    if (h < DUSK)  return `距入夜 ${fmtHours(DUSK - h)}`
    return `距黎明 ${fmtHours(24 - h + DAWN)}`
  }

  // ── Stars ─────────────────────────────────────────────────────────
  const starsDiv = document.getElementById('stars')
  for (let i = 0; i < 130; i++) {
    const el = document.createElement('div')
    el.className = 'star'
    const r  = Math.random()
    const sz = r < 0.06 ? 2.5 : r < 0.25 ? 1.5 : 1
    const dur = (3 + Math.random() * 7).toFixed(1) + 's'
    const del = -(Math.random() * 12).toFixed(1) + 's'
    const lo  = (0.1 + Math.random() * 0.2).toFixed(2)
    const hi  = Math.min(1, parseFloat(lo) + 0.35 + Math.random() * 0.45).toFixed(2)
    el.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `left:${(Math.random()*100).toFixed(2)}%;` +
      `top:${(Math.random()*70).toFixed(2)}%;` +
      `--d:${dur};--dl:${del};--lo:${lo};--hi:${hi}`
    starsDiv.appendChild(el)
  }

  // ── Moon ─────────────────────────────────────────────────────────
  const moonEl = document.getElementById('moon')
  const MOON_RISE = 20, MOON_SET = 5.5
  const MOON_DUR  = 24 - MOON_RISE + MOON_SET   // 9.5 h

  function updateMoon(h) {
    const visible = h >= MOON_RISE || h <= MOON_SET
    let t
    if (h >= MOON_RISE) t = (h - MOON_RISE) / MOON_DUR
    else                t = (24 - MOON_RISE + h) / MOON_DUR
    t = clamp(t, 0, 1)
    const x = lerp(88, 8, t)
    const y = 18 - Math.sin(t * Math.PI) * 10
    moonEl.style.left      = x + 'vw'
    moonEl.style.top       = y + 'vh'
    moonEl.style.transform = 'translate(-50%,-50%)'
    moonEl.style.opacity   = visible ? '1' : '0'
  }

  // ── Horizon glow ─────────────────────────────────────────────────
  const horizEl = document.getElementById('horizon-glow')

  function updateHorizon(h) {
    const inDawn = h >= 4.5 && h <= 7
    const inDusk = h >= 17.5 && h <= 20
    if (inDawn) {
      const a = Math.sin((h - 4.5) / 2.5 * Math.PI)
      horizEl.style.background =
        `radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,140,60,${(a*0.28).toFixed(3)}), transparent 65%)`
    } else if (inDusk) {
      const a = Math.sin((h - 17.5) / 2.5 * Math.PI)
      horizEl.style.background =
        `radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,100,40,${(a*0.30).toFixed(3)}), transparent 65%)`
    } else {
      horizEl.style.background = 'none'
    }
  }

  // ── Main update ───────────────────────────────────────────────────
  const timeEl = document.getElementById('time')
  const descEl = document.getElementById('desc')
  const cdwnEl = document.getElementById('cdwn')
  const lblEl  = document.getElementById('lbl')

  let prevDesc    = ''
  let secretMode  = false

  function update() {
    const now = new Date()
    const hh  = now.getHours()
    const mm  = now.getMinutes()
    const ss  = now.getSeconds()
    const h   = hh + mm / 60 + ss / 3600

    timeEl.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`
    timeEl.dataset.s   = String(ss).padStart(2,'0')

    const sky = getSky(h)
    document.body.style.background =
      `linear-gradient(180deg, ${rgb(sky.top)} 0%, ${rgb(sky.bot)} 100%)`

    starsDiv.style.opacity = sky.stars.toFixed(3)

    const desc = pick(DESC, h)
    if (desc !== prevDesc) {
      descEl.style.opacity = '0'
      setTimeout(() => { descEl.textContent = desc; descEl.style.opacity = '1' }, 450)
      prevDesc = desc
    }

    if (!secretMode) cdwnEl.textContent = getCountdown(h)

    updateHorizon(h)
    updateMoon(h)
  }

  // ── Interactions ──────────────────────────────────────────────────
  timeEl.addEventListener('mouseenter', () => timeEl.classList.add('show-sec'))
  timeEl.addEventListener('mouseleave', () => timeEl.classList.remove('show-sec'))

  lblEl.addEventListener('click', () => {
    secretMode = !secretMode
    if (secretMode) {
      const now = new Date()
      const h   = now.getHours() + now.getMinutes() / 60
      cdwnEl.textContent = pick(SECRETS, h)
      cdwnEl.style.opacity = '0.55'
    } else {
      cdwnEl.style.opacity = ''
    }
  })

  update()
  setInterval(update, 1000)
  </script>
</body>
</html>
