<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归体 · 私典</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html, body {
  width: 100%; height: 100%;
  background: #edeae2;
  overflow: hidden;
  font-family: 'STSong', 'Songti SC', 'SimSun', 'NSimSun', 'Georgia', serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  user-select: none;
  cursor: default;
}

.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.block {
  position: absolute;
  max-width: 340px;
  width: 100%;
  padding: 0 2.4rem;
  text-align: center;
  opacity: 0;
  transition: opacity 2.2s ease;
}

.block.in {
  opacity: 1;
}

.block.out {
  opacity: 0;
}

.line {
  font-size: 1rem;
  line-height: 2.5;
  color: #1a1714;
  letter-spacing: 0.07em;
}

.line.light {
  font-size: 0.9rem;
  line-height: 2.8;
  color: #4e4840;
}

.line.lone {
  font-size: 1.08rem;
  color: #1a1714;
  letter-spacing: 0.09em;
  line-height: 1;
}

.gap {
  height: 1.8rem;
}

/* definition block */
.def-word {
  font-size: clamp(2.8rem, 8vw, 4rem);
  letter-spacing: 0.28em;
  color: #1a1714;
  font-weight: 400;
  line-height: 1;
  margin-bottom: 0.9rem;
}

.def-pinyin {
  font-family: 'Garamond', 'EB Garamond', 'Palatino Linotype', 'Palatino', serif;
  font-size: 0.73rem;
  letter-spacing: 0.38em;
  color: #8c8070;
  font-style: italic;
  margin-bottom: 2.2rem;
}

.def-rule {
  width: 22px;
  height: 1px;
  background: #ccc6b8;
  margin: 0 auto 2.2rem;
}

.def-text {
  font-size: 0.9rem;
  line-height: 2.6;
  color: #5c5448;
  letter-spacing: 0.05em;
}

/* barely-there corner text */
.whisper {
  position: fixed;
  bottom: 1.8rem;
  left: 2rem;
  font-size: 0.68rem;
  color: #dcd8d0;
  letter-spacing: 0.1em;
  pointer-events: none;
}

.section-tag {
  position: fixed;
  top: 1.6rem;
  right: 2rem;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  color: #d8d4cc;
  font-family: 'Garamond', 'Palatino', serif;
  font-style: italic;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="section-tag">§ 私典 · 归体</div>
<div class="whisper">你的身体一直记得。</div>

<script>
const stage = document.getElementById('stage');

function block(html) {
  const el = document.createElement('div');
  el.className = 'block';
  el.innerHTML = html;
  stage.appendChild(el);
  return el;
}

function show(el) {
  void el.offsetWidth;
  el.classList.add('in');
}

function hide(el) {
  el.classList.remove('in');
  el.classList.add('out');
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function run() {

  // ——— phase 1: arrival ———
  const b1 = block(`<p class="line">你回到那张床边。</p>`);
  await wait(900);
  show(b1);
  await wait(4200);

  // ——— phase 2: recognition ———
  const b2 = block(`
    <p class="line">不是你在想它——</p>
    <p class="line">是它在认你。</p>
  `);
  show(b2);
  await wait(5000);

  // ——— phase 3: body acts first ———
  const b3 = block(`
    <p class="line light">床沿的距离，你的手先量到了，</p>
    <p class="line light">你还没决定，</p>
    <p class="line light">你已经坐下去了。</p>
  `);
  hide(b1);
  hide(b2);
  await wait(350);
  show(b3);
  await wait(5500);

  // ——— phase 4: the lone fact ———
  const b4 = block(`<p class="line lone">腰知道这个角度。</p>`);
  hide(b3);
  await wait(350);
  show(b4);
  await wait(6000);

  // ——— phase 5: the reflection ———
  const b5 = block(`
    <p class="line light">这不是记忆——</p>
    <p class="line light">你根本没想到这件事。</p>
    <div class="gap"></div>
    <p class="line light">这只是身体回到了</p>
    <p class="line light">它一直等在的那个形状里。</p>
  `);
  hide(b4);
  await wait(350);
  show(b5);
  await wait(7000);

  // ——— phase 6: definition ———
  const b6 = block(`
    <p class="def-word">归体</p>
    <p class="def-pinyin">guī tǐ</p>
    <div class="def-rule"></div>
    <p class="def-text">睡了多年的那张床的形状。<br>你的身体记得，你自己忘了——<br>直到你回去。</p>
  `);
  hide(b5);
  await wait(450);
  show(b6);
}

run();
</script>
</body>
</html>
