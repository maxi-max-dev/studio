<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踞 · 夜行图鉴 No.013</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #090806; }
canvas { display: block; cursor: crosshair; }
#note {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(155, 135, 95, 0.22);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 10px;
  letter-spacing: 0.24em;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="note">踞 · 夜行图鉴 No.013 · 它们一直在那里</div>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

let W, H, mx = -9999, my = -9999, clock = 0;

function resize() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

// xorshift32 — stable random shapes per creature
function mkRng(seed) {
  let s = seed >>> 0 || 1;
  return () => {
    s ^= s << 13; s >>>= 0;
    s ^= s >> 17;
    s ^= s << 5; s >>>= 0;
    return (s >>> 0) / 4294967296;
  };
}

const PI = Math.PI, TAU = PI * 2;

// Corner indices: 0=TL 1=TR 2=BL 3=BR
// Fan center angle (canvas: right=0, down=PI/2)
const FAN = [
  [PI * 0.25, PI * 0.40],  // TL → down-right quadrant
  [PI * 0.75, PI * 0.40],  // TR → down-left quadrant
  [PI * 1.75, PI * 0.40],  // BL → up-right quadrant
  [PI * 1.25, PI * 0.40],  // BR → up-left quadrant
];

class Juzu {
  constructor(corner) {
    this.corner = corner;
    this.alert = 0;

    const r = mkRng(corner * 998244353 + 7);
    this.breathPhase = r() * TAU;

    const [center, hs] = FAN[corner];
    const N = 8;
    this.legs = Array.from({ length: N }, (_, i) => ({
      base:  center - hs + (i / (N - 1)) * hs * 2,
      len:   38 + r() * 28,       // 38–66 px
      wp:    r() * TAU,            // wave phase
      wf:    0.36 + r() * 0.48,   // wave frequency
      curl:  (r() - 0.5) * 0.20,  // lateral curl
      thick: 0.32 + r() * 0.58,   // base stroke width
    }));
  }

  pos() { return [[0,0],[W,0],[0,H],[W,H]][this.corner]; }

  update(dt) {
    const [cx, cy] = this.pos();
    const dist = Math.hypot(mx - cx, my - cy);
    const tgt = dist < 195 ? Math.pow(1 - dist / 195, 0.62) : 0;
    const rate = tgt > this.alert ? 0.068 : 0.019;
    this.alert += (tgt - this.alert) * rate;
  }

  draw() {
    const [cx, cy] = this.pos();
    const a = this.alert;
    const ma = Math.atan2(my - cy, mx - cx);
    const breath = Math.sin(clock * 0.51 + this.breathPhase) * 0.024;

    ctx.save();
    ctx.translate(cx, cy);

    for (const leg of this.legs) {
      // Subtle angular pull toward mouse when alert
      let ang = leg.base;
      if (a > 0.04) {
        let d = ma - ang;
        while (d > PI) d -= TAU;
        while (d < -PI) d += TAU;
        // Pull is strongest for legs already near mouse direction
        ang += d * a * 0.092 * Math.exp(-d * d * 1.6);
      }

      const len = leg.len * (1 + a * 0.15 + breath * 0.38);
      // Legs wave gently when dormant, still when focused
      const wave = Math.sin(clock * leg.wf + leg.wp) * (1 - a * 0.74) * 5.6;
      const off  = wave + leg.curl * len;

      const ex = Math.cos(ang) * len;
      const ey = Math.sin(ang) * len;
      const px = -Math.sin(ang), py = Math.cos(ang); // perpendicular

      // Bezier: curves in middle, tip lands on the straight line
      const c1x = Math.cos(ang) * len * 0.30 + px * off * 0.46;
      const c1y = Math.sin(ang) * len * 0.30 + py * off * 0.46;
      const c2x = Math.cos(ang) * len * 0.68 + px * off * 0.90;
      const c2y = Math.sin(ang) * len * 0.68 + py * off * 0.90;

      const rootA = 0.052 + a * 0.29;
      const tipA  = 0.014 + a * 0.08;
      const g = ctx.createLinearGradient(0, 0, ex, ey);
      g.addColorStop(0,    `rgba(198, 170, 118, ${rootA})`);
      g.addColorStop(0.52, `rgba(182, 150, 100, ${rootA * 0.66})`);
      g.addColorStop(1,    `rgba(160, 130,  80, ${tipA})`);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
      ctx.strokeStyle = g;
      ctx.lineWidth = leg.thick + a * 0.44;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Central body: small radial glow
    const br = 2.0 + a * 2.2;
    const bo = 0.17 + a * 0.60;
    const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, br * 2.9);
    bg.addColorStop(0,    `rgba(238, 210, 158, ${bo})`);
    bg.addColorStop(0.36, `rgba(198, 162, 108, ${bo * 0.45})`);
    bg.addColorStop(1,    'rgba(140, 108, 65, 0)');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(0, 0, br * 2.9, 0, TAU);
    ctx.fill();

    // Eye gleam — appears only at high alert, oriented toward the mouse
    if (a > 0.56) {
      const f = (a - 0.56) / 0.44;
      const eox = Math.cos(ma) * 2.1;
      const eoy = Math.sin(ma) * 2.1;
      ctx.fillStyle = `rgba(255, 244, 215, ${f * 0.88})`;
      ctx.beginPath();
      ctx.arc(eox, eoy, 1.05, 0, TAU);
      ctx.fill();
    }

    ctx.restore();
  }
}

const creatures = [0, 1, 2, 3].map(i => new Juzu(i));
let last = 0;

function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  clock += dt;

  ctx.fillStyle = '#090806';
  ctx.fillRect(0, 0, W, H);

  creatures.forEach(c => { c.update(dt); c.draw(); });
  requestAnimationFrame(frame);
}

// First RAF just sets `last` so dt doesn't spike on frame 1
requestAnimationFrame(t => { last = t; requestAnimationFrame(frame); });
</script>
</body>
</html>
