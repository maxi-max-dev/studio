<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>界面考古馆 · INTERFACE ARCHAEOLOGY</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      overflow: hidden;
      background: var(--bg);
    }

    .lobby {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    .lobby::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
      pointer-events: none;
    }

    /* Radial glow in center */
    .lobby::after {
      content: '';
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(200, 169, 110, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    .lobby-header {
      text-align: center;
      margin-bottom: 4rem;
      position: relative;
      z-index: 1;
    }

    .lobby-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .lobby-eyebrow::before,
    .lobby-eyebrow::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
    }

    .lobby-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .lobby-title em {
      font-style: normal;
      color: var(--gold);
    }

    .lobby-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* Timeline */
    .timeline {
      display: flex;
      align-items: stretch;
      gap: 0;
      position: relative;
      z-index: 1;
      max-width: min(92vw, 900px);
    }

    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--border-light) 10%,
        var(--border-light) 90%,
        transparent 100%);
      pointer-events: none;
    }

    .era-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.4rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
    }

    .era-card:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .era-card:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }

    .era-card:not(:first-child) { border-left: none; }

    .era-card:hover {
      background: var(--surface-2);
      z-index: 2;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .era-card:hover .era-num { opacity: 1; }
    .era-card:hover .era-year { color: var(--gold); }

    .era-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-light);
      margin-bottom: 0.2rem;
      transition: background 0.2s;
    }

    .era-card:hover .era-dot { background: var(--gold); }

    .era-year {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dim);
      transition: color 0.2s;
      font-variant-numeric: tabular-nums;
    }

    .era-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .era-hint {
      font-size: 0.7rem;
      color: var(--text-faint);
      line-height: 1.4;
    }

    .era-num {
      position: absolute;
      top: 0.6rem;
      right: 0.8rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Color accents per card */
    .era-card.cli:hover .era-dot { background: var(--accent-cli); }
    .era-card.cli:hover .era-year { color: var(--accent-cli); }
    .era-card.gui:hover .era-dot { background: var(--accent-gui); }
    .era-card.gui:hover .era-year { color: var(--accent-gui); }
    .era-card.touch:hover .era-dot { background: var(--accent-touch); }
    .era-card.touch:hover .era-year { color: var(--accent-touch); }
    .era-card.llm:hover .era-dot { background: var(--accent-llm); }
    .era-card.llm:hover .era-year { color: var(--accent-llm); }
    .era-card.noif:hover .era-dot { background: var(--gold); }
    .era-card.noif:hover .era-year { color: var(--gold); }

    /* Footer quote */
    .lobby-quote {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      text-align: center;
      position: relative;
      z-index: 1;
      font-style: italic;
    }

    .lobby-quote strong {
      color: var(--text-dim);
      font-style: normal;
    }

    /* Enter hint */
    .enter-hint {
      margin-top: 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="lobby">
    <header class="lobby-header">
      <div class="lobby-eyebrow">界面考古馆</div>
      <h1 class="lobby-title">
        <em>INTERFACE</em><br>ARCHAEOLOGY
      </h1>
      <p class="lobby-subtitle">人类与机器之间，那道正在消失的门</p>
    </header>

    <nav class="timeline">
      <a href="room-cli.html" class="era-card cli">
        <span class="era-num">01</span>
        <div class="era-dot"></div>
        <div class="era-year">1984</div>
        <div class="era-name">命令行时代</div>
        <div class="era-hint">字符、光标<br>与黑暗里的绿光</div>
      </a>
      <a href="room-gui.html" class="era-card gui">
        <span class="era-num">02</span>
        <div class="era-dot"></div>
        <div class="era-year">1995</div>
        <div class="era-name">图形界面时代</div>
        <div class="era-hint">窗口、图标<br>与那个开始菜单</div>
      </a>
      <a href="room-touch.html" class="era-card touch">
        <span class="era-num">03</span>
        <div class="era-dot"></div>
        <div class="era-year">2007</div>
        <div class="era-name">触摸时代</div>
        <div class="era-hint">手指、滑动<br>与消失的键盘</div>
      </a>
      <a href="room-llm.html" class="era-card llm">
        <span class="era-num">04</span>
        <div class="era-dot"></div>
        <div class="era-year">2023</div>
        <div class="era-name">语言模型时代</div>
        <div class="era-hint">意图、语言<br>与千人千面</div>
      </a>
      <a href="room-nointerface.html" class="era-card noif">
        <span class="era-num">05</span>
        <div class="era-dot"></div>
        <div class="era-year">∞</div>
        <div class="era-name">无界面</div>
        <div class="era-hint">感觉不到<br>它的存在</div>
      </a>
    </nav>

    <p class="lobby-quote">
      「最好的设计，是你感觉不到它存在。」<br>
      <strong>— 界面，终将消失</strong>
    </p>

    <p class="enter-hint">选择一个展厅进入</p>
  </div>
</body>
</html>
